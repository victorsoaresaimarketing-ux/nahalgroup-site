<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>Proposta · Nahal Group para a Spode</title>
<meta name="theme-color" content="#06121C">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#06121C;--cyan:#46D6EC;--aqua:#2F9BD6;--red:#FF2A22;--txt:#eaf3fa;--mut:#90a6b8;--head:'Oswald',sans-serif;--disp:'Anton',sans-serif;--sans:'Inter',system-ui,sans-serif}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{font-family:var(--sans);background:var(--bg);color:var(--txt);overflow:hidden;-webkit-font-smoothing:antialiased}
  #bg{position:fixed;inset:0;z-index:0}
  .glow{position:fixed;inset:0;z-index:1;pointer-events:none;background:
    radial-gradient(44% 58% at 15% 46%, rgba(70,214,236,.16), transparent 70%),
    radial-gradient(44% 58% at 85% 54%, rgba(255,42,34,.15), transparent 70%),
    radial-gradient(130% 100% at 50% 122%, transparent 40%, #06121C 80%)}
  .stage{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:34px 22px}
  .kicker{font-family:var(--head);font-weight:600;font-size:12.5px;letter-spacing:.36em;text-transform:uppercase;color:var(--cyan);opacity:0;animation:rise .9s .15s forwards}
  .lock{display:flex;align-items:center;justify-content:center;gap:24px;margin:24px 0 30px;flex-wrap:wrap;opacity:0;animation:rise .9s .32s forwards}
  .brand{display:flex;align-items:center;gap:12px}
  .nahal .nm{width:42px;height:42px;filter:drop-shadow(0 0 13px rgba(70,214,236,.6))}
  .nahal .wm{font-family:var(--head);font-weight:700;font-size:24px;letter-spacing:.05em;color:#fff;line-height:.8;text-align:left}
  .nahal .wm i{display:block;font-family:var(--sans);font-weight:600;font-style:normal;font-size:8px;letter-spacing:.34em;color:var(--cyan);margin-top:4px}
  .divider{width:1px;height:48px;background:linear-gradient(180deg,transparent,rgba(144,166,184,.55),transparent)}
  .spode{align-items:center}
  .spode .bolt{width:25px;height:25px;filter:drop-shadow(0 0 11px rgba(255,42,34,.75))}
  .spode .sp{font-family:var(--head);font-weight:700;font-style:italic;font-size:26px;letter-spacing:.03em;color:#fff;line-height:.8}
  .s360{position:relative;width:39px;height:39px;margin-left:11px;display:inline-flex;align-items:center;justify-content:center;font-family:var(--head);font-weight:600;font-size:12.5px;letter-spacing:.01em;color:#fff;border:1.5px solid rgba(255,42,34,.38);border-radius:50%}
  .s360 .ring{position:absolute;inset:-3px;border:1.5px solid transparent;border-top-color:var(--red);border-right-color:var(--red);border-radius:50%;animation:spin 4s linear infinite;filter:drop-shadow(0 0 6px rgba(255,42,34,.55))}
  h1{font-family:var(--disp);font-weight:400;text-transform:uppercase;font-size:clamp(42px,9vw,100px);line-height:.92;letter-spacing:.01em;color:#fff;text-shadow:0 6px 50px rgba(0,0,0,.5);opacity:0;animation:rise 1s .46s forwards}
  h1 .red{color:var(--red)}
  .sub{max-width:580px;margin:22px auto 0;font-size:clamp(15px,2.3vw,18px);line-height:1.62;color:#c2d2df;opacity:0;animation:rise 1s .6s forwards}
  .sub b{color:#fff;font-weight:600}
  .cta{margin-top:38px;display:inline-flex;align-items:center;gap:12px;font-family:var(--head);font-weight:600;text-transform:uppercase;letter-spacing:.07em;font-size:15px;color:#04101a;background:linear-gradient(120deg,var(--cyan),#84e9f7);padding:17px 34px;border-radius:11px;text-decoration:none;box-shadow:0 0 30px -4px rgba(70,214,236,.7),0 16px 40px -12px rgba(0,0,0,.6);opacity:0;animation:rise 1s .78s forwards;transition:transform .25s,box-shadow .25s}
  .cta:hover{transform:translateY(-3px);box-shadow:0 0 46px -2px rgba(70,214,236,.95),0 22px 50px -12px rgba(0,0,0,.7)}
  .cta svg{width:19px;height:19px}
  .steps{margin-top:22px;font-family:var(--head);font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:var(--mut);opacity:0;animation:rise 1s .95s forwards}
  .steps b{color:var(--cyan);font-weight:600}
  @keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @media(max-width:520px){.lock{gap:14px}.divider{display:none}.nahal .wm{font-size:21px}.spode .sp{font-size:23px}.s360{width:35px;height:35px}}
  @media(prefers-reduced-motion:reduce){.kicker,.lock,h1,.sub,.cta,.steps{animation:none;opacity:1}.s360 .ring{animation:none}}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="glow"></div>
<div class="stage">
  <div class="kicker">Proposta exclusiva</div>
  <div class="lock">
    <div class="brand nahal">
      <svg class="nm" viewBox="0 0 48 48" fill="none" aria-hidden="true"><circle cx="24" cy="15" r="3.4" fill="#46D6EC"/><path d="M15 30 a9 9 0 0 0 18 0" stroke="#46D6EC" stroke-width="3" stroke-linecap="round"/><path d="M10 30 a14 14 0 0 0 28 0" stroke="#7fb9de" stroke-width="2.3" stroke-linecap="round"/></svg>
      <span class="wm">NAHAL<i>GROUP</i></span>
    </div>
    <span class="divider"></span>
    <div class="brand spode">
      <svg class="bolt" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M13 2 4 14h6l-1 8 11-13h-7l1-7z" fill="#FF2A22"/></svg>
      <span class="sp">SPODE</span><span class="s360">360<span class="ring"></span></span>
    </div>
  </div>
  <h1>Feita para a <span class="red">Spode</span>.</h1>
  <p class="sub">Apresentamos a <b>Spode 360</b>: do campo à diretoria, a operação inteira de vocês em um lugar só. Preparamos uma demonstração pra você ver, na prática, o que a gente vai construir juntos.</p>
  <a class="cta" href="/spode-proposta">Começar o tour <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12h14M12 5l7 7-7 7"/></svg></a>
  <div class="steps">4 passos <b>·</b> cerca de 3 minutos</div>
</div>
<script>
(function(){
  var cv=document.getElementById('bg'),ctx=cv.getContext('2d'),W,H,DPR,P=[],N;
  var rnd=function(a,b){return a+Math.random()*(b-a)};
  function size(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';N=Math.min(110,Math.floor(innerWidth/13));}
  function seed(){P=[];for(var i=0;i<N;i++){P.push({x:rnd(0,W),y:rnd(0,H),r:rnd(.6,2.2)*DPR,s:rnd(.1,.45)*DPR,ph:rnd(0,6.28),sw:rnd(.3,1),c:Math.random()<.5});}}
  function paint(step){
    ctx.clearRect(0,0,W,H);
    for(var k=0;k<P.length;k++){var p=P[k];
      if(step){p.y-=p.s;p.x+=Math.sin(p.y*0.01+p.ph)*p.sw*DPR*0.3;
        if(p.y<-12){p.y=H+12;p.x=rnd(0,W);}if(p.x<-12)p.x=W+12;if(p.x>W+12)p.x=-12;}
      var col=p.c?'70,214,236':'255,42,34';
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,6.28);ctx.fillStyle='rgba('+col+','+(0.07+p.r/(3*DPR)*0.12)+')';ctx.fill();}
  }
  size();seed();addEventListener('resize',function(){size();seed();paint(false);});
  if(matchMedia('(prefers-reduced-motion: reduce)').matches){paint(false);return;}
  var raf=null,loop=function(){paint(true);raf=requestAnimationFrame(loop);};
  var play=function(){if(!raf)raf=requestAnimationFrame(loop);},stop=function(){if(raf){cancelAnimationFrame(raf);raf=null;}};
  document.addEventListener('visibilitychange',function(){document.hidden?stop():play();});
  play();
})();
</script>
</body>
</html>
