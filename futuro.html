<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Conheça o futuro · VictorIA</title>
<meta name="description" content="Você não vai ver um vídeo. Vai ver acontecendo. Converse com a VictorIA, a inteligência do Victor Soares, e saia com uma primeira visão de como automatizar o seu negócio.">
<meta name="robots" content="noindex, follow">
<meta name="theme-color" content="#06121C">
<meta property="og:title" content="Conheça o futuro · VictorIA">
<meta property="og:description" content="Não vou te mostrar um vídeo. Vou te mostrar acontecendo.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://nahalgroup.com.br/futuro">
<meta name="twitter:card" content="summary">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 120'%3E%3Crect width='120' height='120' rx='22' fill='%2315608F'/%3E%3Ccircle cx='60' cy='32' r='7' fill='%23fff'/%3E%3Cpath d='M40 66a20 20 0 0 0 40 0' fill='none' stroke='%23fff' stroke-width='6' stroke-linecap='round'/%3E%3Cpath d='M26 66a34 34 0 0 0 68 0' fill='none' stroke='%23fff' stroke-width='6' stroke-linecap='round'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jura:wght@300;400;500;600;700&family=Instrument+Sans:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  html,body{height:100%}
  body{overflow:hidden}

  /* ABERTURA (micro-sim) */
  .fut-open{position:fixed;inset:0;z-index:10;display:flex;align-items:center;justify-content:center;text-align:center;padding:40px 26px}
  .fut-open-in{max-width:680px;animation:futin .9s cubic-bezier(.2,.7,.2,1) both}
  @keyframes futin{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
  .vi-orb{width:96px;height:96px;margin:0 auto 30px;border-radius:50%;background:linear-gradient(150deg,#15608F,#2F9BD6);display:flex;align-items:center;justify-content:center;box-shadow:0 18px 50px -12px rgba(70,214,236,.6);position:relative}
  .vi-orb svg{width:50px;height:50px}
  .vi-orb::after{content:"";position:absolute;inset:-1px;border-radius:50%;border:1px solid rgba(70,214,236,.5);animation:viring 4.5s ease-out infinite}
  @keyframes viring{0%{opacity:.7;transform:scale(.85)}80%{opacity:0}100%{opacity:0;transform:scale(1.45)}}
  .fut-open .kick{display:inline-block;color:var(--ceu);margin-bottom:22px}
  .fut-open h1{font-family:var(--jura);font-weight:600;font-size:clamp(30px,7.2vw,62px);color:#fff;letter-spacing:-.01em;line-height:1.04;text-wrap:balance}
  .fut-open p{font-size:clamp(17px,2.4vw,22px);color:rgba(220,235,245,.82);margin:22px auto 0;max-width:32ch;text-wrap:balance}
  .fut-cta{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-top:40px}
  .fut-cta .btn{font-size:13px;padding:17px 32px}
  .fut-soft{margin-top:26px;color:var(--muted);font-size:15px;line-height:1.7;max-width:34ch;margin-left:auto;margin-right:auto;text-wrap:balance}

  /* CHAT (tela cheia) */
  .fut-chat{position:fixed;inset:0;z-index:15;display:none;flex-direction:column;background:rgba(6,16,24,.86);backdrop-filter:blur(6px)}
  .fut-chat.on{display:flex;animation:futin .4s ease both}
  .vchat-h{display:flex;align-items:center;gap:12px;padding:14px 16px;padding-top:max(14px,env(safe-area-inset-top));border-bottom:1px solid var(--panel-bd);background:linear-gradient(160deg,rgba(21,96,143,.42),transparent);flex-shrink:0}
  .vchat-h .sym{width:38px;height:38px;border-radius:50%;background:linear-gradient(150deg,#15608F,#2F9BD6);display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative}
  .vchat-h .sym svg{width:21px;height:21px}
  .vchat-h .sym .dot{position:absolute;right:-1px;bottom:-1px;width:11px;height:11px;border-radius:50%;background:#42e6a4;border:2px solid #0a1822}
  .vchat-h .tt{flex:1;line-height:1.3;min-width:0}
  .vchat-h .tt b{color:#fff;font-size:16px;font-weight:600;font-family:var(--sans);display:block}
  .vchat-h .tt span{color:var(--ceu);font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase}
  .vchat-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px;display:flex;flex-direction:column;gap:10px;max-width:760px;width:100%;margin:0 auto}
  .vchat-f{padding:12px;padding-bottom:max(12px,env(safe-area-inset-bottom));border-top:1px solid var(--panel-bd);display:flex;gap:8px;align-items:flex-end;background:rgba(6,16,24,.7);max-width:760px;width:100%;margin:0 auto;flex-shrink:0}
  .vchat-f textarea{flex:1;resize:none;background:rgba(255,255,255,.05);border:1px solid var(--panel-bd);border-radius:14px;color:#fff;font-family:var(--sans);font-size:16px;padding:13px 15px;max-height:120px;line-height:1.4}
  .vchat-f textarea:focus{outline:none;border-color:rgba(70,214,236,.55)}
  .vchat-f textarea::placeholder{color:var(--muted)}
  .vchat-f .send{width:46px;height:46px;flex-shrink:0;border:none;border-radius:14px;background:linear-gradient(150deg,#2F9BD6,#46D6EC);color:#06121C;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .vchat-f .send:disabled{opacity:.45;cursor:default}
  .vchat-f .send svg{width:19px;height:19px}
  @media(max-width:430px){.vchat-body{padding:16px}}
</style>
</head>
<body data-page="futuro">

<canvas id="flow"></canvas>

<section class="fut-open" id="open">
  <div class="fut-open-in">
    <div class="vi-orb"><svg viewBox="0 0 48 48" fill="none" aria-hidden="true"><circle cx="24" cy="15" r="3.4" fill="#fff"/><path d="M15 30 a9 9 0 0 0 18 0" stroke="#fff" stroke-width="3" stroke-linecap="round"/><path d="M10 30 a14 14 0 0 0 28 0" stroke="#bfe6f5" stroke-width="2.3" stroke-linecap="round"/></svg></div>
    <span class="mono kick">VictorIA · a inteligência do Victor</span>
    <h1>Você está pronto para conhecer o futuro?</h1>
    <p>Não vou te mostrar um vídeo.<br>Vou te mostrar acontecendo.</p>
    <div class="fut-cta">
      <button class="btn btn-p" id="go" type="button">Estou pronto</button>
      <button class="btn btn-g" id="notyet" type="button">Ainda não</button>
    </div>
    <div class="fut-soft" id="soft" hidden>Sem pressa. Quando você estiver pronto pra ver, é só clicar em Estou pronto.</div>
  </div>
</section>

<section class="fut-chat" id="chat">
  <header class="vchat-h">
    <span class="sym"><svg viewBox="0 0 48 48" fill="none" aria-hidden="true"><circle cx="24" cy="15" r="3.4" fill="#fff"/><path d="M15 30 a9 9 0 0 0 18 0" stroke="#fff" stroke-width="3" stroke-linecap="round"/><path d="M10 30 a14 14 0 0 0 28 0" stroke="#bfe6f5" stroke-width="2.3" stroke-linecap="round"/></svg><span class="dot"></span></span>
    <span class="tt"><b>VictorIA</b><span>a inteligência do Victor · online</span></span>
  </header>
  <div class="vchat-body" id="vbody"></div>
  <div class="vchat-f">
    <textarea id="vinput" rows="1" placeholder="Escreva aqui..." aria-label="Sua mensagem"></textarea>
    <button class="send" id="vsend" type="button" aria-label="Enviar"><svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
  </div>
</section>

<script>
(function(){
  "use strict";
  var reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;

  /* ===== fundo: correnteza + peixes (assinatura da marca) ===== */
  var cv = document.getElementById('flow');
  if (!reduce && cv){
    var ctx = cv.getContext('2d');
    var W,H,DPR,N=Math.min(150,Math.floor(innerWidth/9)),P=[],R=[],F=[];
    var rnd=function(a,b){return a+Math.random()*(b-a);};
    function size(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';}
    function seed(){P=[];for(var i=0;i<N;i++)P.push({x:rnd(0,W),y:rnd(0,H),r:rnd(.6,2.3)*DPR,s:rnd(.15,.7)*DPR,ph:rnd(0,6.28),sw:rnd(.3,1.1)});}
    function makeFish(reset){var depth=rnd(0,1);var dir=Math.random()<.5?1:-1;var L=rnd(8,17)*(1-depth*0.45)*DPR;return{x:reset?(dir>0?-L*1.7:W+L*1.7):rnd(0,W),y:rnd(H*0.12,H*0.92),dir:dir,sp:rnd(.25,.7)*(1-depth*0.4)*DPR,L:L,a:0.05+(1-depth)*0.11,ph:rnd(0,6.28),vy:rnd(-.05,.05)*DPR,fin:Math.random()<.55};}
    function seedFish(){F=[];var n=Math.max(4,Math.min(9,Math.floor(innerWidth/210)));for(var i=0;i<n;i++)F.push(makeFish(false));}
    function drawFish(f,t){var w=Math.sin(t*0.005+f.ph)*f.L*0.3;ctx.save();ctx.translate(f.x,f.y+Math.sin(t*0.0018+f.ph)*2*DPR);ctx.scale(f.dir,1);ctx.fillStyle='rgba(127,185,222,'+f.a+')';ctx.beginPath();ctx.ellipse(0,0,f.L,f.L*0.42,0,0,6.28);ctx.fill();ctx.beginPath();ctx.moveTo(-f.L*0.82,0);ctx.lineTo(-f.L*1.5,-f.L*0.45+w);ctx.lineTo(-f.L*1.5,f.L*0.45+w);ctx.closePath();ctx.fill();if(f.fin){ctx.beginPath();ctx.moveTo(f.L*0.15,-f.L*0.4);ctx.lineTo(-f.L*0.3,-f.L*0.82);ctx.lineTo(-f.L*0.42,-f.L*0.36);ctx.closePath();ctx.fill();}ctx.restore();}
    size();seed();seedFish();
    addEventListener('resize',function(){size();seed();seedFish();});
    var mx=-999,my=-999,lastR=0;
    addEventListener('pointermove',function(e){mx=e.clientX*DPR;my=e.clientY*DPR;var now=performance.now();if(now-lastR>90&&R.length<24){R.push({x:mx,y:my,rad:2*DPR,a:.5});lastR=now;}},{passive:true});
    var raf=null;
    function frame(){
      var t=performance.now();ctx.clearRect(0,0,W,H);
      for(var j=0;j<F.length;j++){var f=F[j];f.x+=f.sp*f.dir;f.y+=f.vy;var fdx=f.x-mx,fdy=f.y-my,fr=95*DPR;if(fdx*fdx+fdy*fdy<fr*fr){var fd=Math.sqrt(fdx*fdx+fdy*fdy)||1;var push=(1-fd/fr)*4.2*DPR;f.x+=fdx/fd*push;f.y+=fdy/fd*push;f.dir=fdx>=0?1:-1;}if(f.y<H*0.06)f.y=H*0.06;if(f.y>H*0.95)f.y=H*0.95;if((f.dir>0&&f.x-f.L*1.7>W)||(f.dir<0&&f.x+f.L*1.7<0))F[j]=makeFish(true);else drawFish(f,t);}
      for(var k=0;k<P.length;k++){var p=P[k];p.y+=p.s;p.x+=Math.sin(p.y*0.01+p.ph)*p.sw*DPR*0.4;var dx=p.x-mx,dy=p.y-my,d2=dx*dx+dy*dy,rad=110*DPR;if(d2<rad*rad){var d=Math.sqrt(d2)||1;var fo=(1-d/rad)*1.6;p.x+=dx/d*fo;p.y+=dy/d*fo;}if(p.y>H+12){p.y=-12;p.x=rnd(0,W);}if(p.x<-12)p.x=W+12;if(p.x>W+12)p.x=-12;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,6.28);ctx.fillStyle='rgba(127,185,222,'+(0.10+p.r/(3*DPR)*0.12)+')';ctx.fill();}
      for(var i=R.length-1;i>=0;i--){var r=R[i];r.rad+=2.6*DPR;r.a*=0.945;if(r.a<0.02){R.splice(i,1);continue;}ctx.beginPath();ctx.arc(r.x,r.y,r.rad,0,6.28);ctx.strokeStyle='rgba(70,214,236,'+r.a+')';ctx.lineWidth=1.2*DPR;ctx.stroke();}
      raf=requestAnimationFrame(frame);
    }
    var play=function(){if(!raf)raf=requestAnimationFrame(frame);};
    var stop=function(){if(raf){cancelAnimationFrame(raf);raf=null;}};
    document.addEventListener('visibilitychange',function(){document.hidden?stop():play();});
    play();
  }

  /* ===== funil ===== */
  var WEBHOOK = 'https://alphatrinity.app.n8n.cloud/webhook/victoria';
  /* abertura humanizada, em mensagens picadas (uma por linha) */
  var GREET = 'Oi! Tudo bem? 🌊\nEu sou a VictorIA, a inteligência do Victor.\nAntes da gente começar, como você se chama? E o que a sua empresa faz?';

  var store = (function(){ try{ var s=window.sessionStorage; s.setItem('_vt','1'); s.removeItem('_vt'); return s; }catch(e){ var m={}; return {getItem:function(k){return (k in m)?m[k]:null;},setItem:function(k,v){m[k]=v;},removeItem:function(k){delete m[k];}}; } })();
  var sid = store.getItem('vchat_sid'); if(!sid){ sid='v'+Date.now()+Math.random().toString(36).slice(2,8); store.setItem('vchat_sid', sid); }
  var msgs; try{ msgs = JSON.parse(store.getItem('vchat_msgs')||'null'); }catch(e){ msgs=null; }
  if(!msgs || !msgs.length){ msgs=[{role:'assistant', content:GREET}]; }
  var leadSent = store.getItem('vchat_lead')==='1';
  var greeted = store.getItem('vchat_greeted')==='1';
  var busy=false, started=false;
  function save(){ try{ store.setItem('vchat_msgs', JSON.stringify(msgs)); store.setItem('vchat_lead', leadSent?'1':'0'); store.setItem('vchat_greeted', greeted?'1':'0'); }catch(e){} }

  var openS=document.getElementById('open'), chatS=document.getElementById('chat');
  var body=document.getElementById('vbody'), input=document.getElementById('vinput'), sendBtn=document.getElementById('vsend');

  function bubble(role, text){ var d=document.createElement('div'); d.className='nchat-msg '+(role==='user'?'me':'bot'); d.textContent=text; body.appendChild(d); body.scrollTop=body.scrollHeight; }
  function typing(on){ var t=body.querySelector('.nchat-typing'); if(on){ if(!t){ t=document.createElement('div'); t.className='nchat-typing'; t.innerHTML='<i></i><i></i><i></i>'; body.appendChild(t); body.scrollTop=body.scrollHeight; } } else if(t){ t.parentNode.removeChild(t); } }
  function grow(){ input.style.height='auto'; input.style.height=Math.min(input.scrollHeight,120)+'px'; }

  /* picar a fala em bolhas (uma por linha) */
  function chunks(text){ return String(text).split('\n').map(function(s){return s.trim();}).filter(Boolean); }
  /* tempo de resposta humano: lê + digita, proporcional ao tamanho */
  function pace(t){ return Math.min(2100, Math.max(650, 520 + t.length*26)); }
  function playBubbles(parts, i, done){
    if(i>=parts.length){ if(done) done(); return; }
    typing(true);
    setTimeout(function(){
      typing(false); bubble('assistant', parts[i]);
      playBubbles(parts, i+1, done);
    }, pace(parts[i]));
  }
  function renderInstant(){
    body.innerHTML='';
    for(var i=0;i<msgs.length;i++){
      if(msgs[i].role==='user'){ bubble('user', msgs[i].content); }
      else { var cs=chunks(msgs[i].content); for(var j=0;j<cs.length;j++) bubble('assistant', cs[j]); }
    }
  }

  /* teclado mobile: mantém o campo acima do teclado */
  function isMobile(){ return window.matchMedia('(max-width:600px)').matches; }
  function fit(){ if(!chatS.classList.contains('on')) return; if(window.visualViewport && isMobile()){ var vv=window.visualViewport; chatS.style.height=vv.height+'px'; chatS.style.top=(vv.offsetTop||0)+'px'; body.scrollTop=body.scrollHeight; } else { chatS.style.height=''; chatS.style.top=''; } }
  if(window.visualViewport){ window.visualViewport.addEventListener('resize', fit); window.visualViewport.addEventListener('scroll', fit); }

  function start(){
    openS.style.display='none';
    chatS.classList.add('on');
    if(!started){
      started=true;
      if(!greeted && msgs.length===1){
        busy=true; sendBtn.disabled=true;
        playBubbles(chunks(GREET), 0, function(){ greeted=true; save(); busy=false; sendBtn.disabled=false; if(!isMobile()){ try{ input.focus(); }catch(e){} } });
      } else {
        renderInstant();
        setTimeout(function(){ if(!isMobile()){ try{ input.focus(); }catch(e){} } }, 200);
      }
    }
    fit(); body.scrollTop=body.scrollHeight;
  }

  document.getElementById('go').addEventListener('click', start);
  document.getElementById('notyet').addEventListener('click', function(){ document.getElementById('soft').hidden=false; });

  function send(){
    var text=input.value.trim(); if(!text||busy) return;
    msgs.push({role:'user', content:text}); bubble('user', text); save();
    input.value=''; grow(); busy=true; sendBtn.disabled=true; typing(true);
    fetch(WEBHOOK,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sessionId:sid,leadSent:leadSent,messages:msgs})})
      .then(function(r){ return r.json(); })
      .then(function(d){
        typing(false);
        var reply=(d&&d.reply)?d.reply:'Recebi sua mensagem, já te respondo por aqui.';
        msgs.push({role:'assistant', content:reply});
        if(d&&d.leadReady){ leadSent=true; }
        save();
        playBubbles(chunks(reply), 0, function(){ busy=false; sendBtn.disabled=false; });
      })
      .catch(function(){
        typing(false);
        bubble('assistant','Opa, deu um nó aqui pra responder agora. Me dá um segundo e manda de novo?');
        busy=false; sendBtn.disabled=false;
      });
  }
  sendBtn.addEventListener('click', send);
  input.addEventListener('input', grow);
  input.addEventListener('keydown', function(e){ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); } });
})();
</script>
</body>
</html>
